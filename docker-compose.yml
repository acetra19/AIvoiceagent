version: '3.8'

services:
  handwerker-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: handwerker-ai
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - app-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  app-logs:
    driver: local
