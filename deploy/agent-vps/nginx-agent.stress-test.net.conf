# Install: sudo cp to /etc/nginx/sites-available/agent.stress-test.net
# Enable:  sudo ln -sf /etc/nginx/sites-available/agent.stress-test.net /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# TLS:    sudo certbot --nginx -d agent.stress-test.net

server {
	listen 80;
	listen [::]:80;
	server_name agent.stress-test.net;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_connect_timeout 60s;
		proxy_send_timeout 60s;
		proxy_read_timeout 60s;
	}
}
