# Nach erfolgreichem certbot: Inhalt prüfen / mit sites-available abgleichen.
# Wichtig: Beide Server (80 + 443) müssen zu Node proxyen, nicht zu /var/www/html.

server {
	listen 80;
	listen [::]:80;
	server_name agent.stress-test.net;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name agent.stress-test.net;

	ssl_certificate     /etc/letsencrypt/live/agent.stress-test.net/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/agent.stress-test.net/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	# Falls Datei fehlt: Zeile auskommentieren → sudo nginx -t
	# ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	location / {
		proxy_pass http://127.0.0.1:3000;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_connect_timeout 60s;
		proxy_send_timeout 60s;
		proxy_read_timeout 60s;
	}
}
